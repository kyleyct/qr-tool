<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code 生成器 Pro</title>
    <!-- 引入 QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- 引入 Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 1.5rem; margin-top: 0; text-align: center; color: #2c3e50; }
        .section { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .color-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .color-row > div { flex: 1; }
        .color-input-wrap { display: flex; align-items: center; gap: 0.5rem; }
        input[type="color"] { width: 44px; height: 38px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; padding: 0; background: none; }
        .logo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 10px; }
        .logo-item { border: 2px solid #eee; border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; transition: 0.2s; background: #fafafa; }
        .logo-item:hover { border-color: #3498db; background: #ebf5fb; }
        .logo-item.active { border-color: #3498db; background: #ebf5fb; color: #3498db; }
        .logo-item i { font-size: 1.5rem; display: block; margin-bottom: 4px; }
        .logo-item span { font-size: 11px; display: block; }
        #preview { background: #eee; border-radius: 12px; padding: 20px; text-align: center; min-height: 200px; display: flex; align-items: center; justify-content: center; margin-top: 1.5rem; position: relative; overflow: hidden; background-image: radial-gradient(#ccc 1px, transparent 1px); background-size: 20px 20px; }
        #qrcode { display: inline-block; background: transparent; }
        #qrcode canvas, #qrcode img { max-width: 100%; height: auto; }
        .btn { display: block; width: 100%; padding: 0.8rem; background: #3498db; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 1rem; text-decoration: none; text-align: center; }
        .btn:hover { background: #2980b9; }
        .hidden { display: none; }
        #wifi-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1><i class="fa-solid fa-qrcode"></i> QR Code 生成器 Pro</h1>
        
        <div class="section">
            <label>內容類型</label>
            <select id="contentType">
                <option value="text">文本 / 網址</option>
                <option value="tel">電話號碼</option>
                <option value="wifi">Wi-Fi 網路</option>
            </select>
        </div>

        <div id="textInputGroup" class="section">
            <label>輸入網址或文字</label>
            <input type="text" id="textInput" placeholder="https://example.com" value="https://google.com">
        </div>

        <div id="telInputGroup" class="section hidden">
            <label>輸入電話號碼</label>
            <input type="text" id="telInput" placeholder="例如: +85212345678">
        </div>

        <div id="wifiInputGroup" class="section hidden">
            <div id="wifi-fields">
                <div>
                    <label>SSID (名稱)</label>
                    <input type="text" id="wifiSsid" placeholder="WiFi 名稱">
                </div>
                <div>
                    <label>密碼</label>
                    <input type="password" id="wifiPass" placeholder="WiFi 密碼">
                </div>
            </div>
            <label style="margin-top: 0.5rem;">加密類型</label>
            <select id="wifiEnc">
                <option value="WPA">WPA/WPA2</option>
                <option value="WEP">WEP</option>
                <option value="nopass">無密碼</option>
            </select>
        </div>

        <div class="color-row">
            <div>
                <label>碼色</label>
                <div class="color-input-wrap">
                    <input type="color" id="darkColor" value="#000000">
                </div>
            </div>
            <div>
                <label>底色</label>
                <div class="color-input-wrap">
                    <input type="color" id="lightColor" value="#ffffff">
                    <label style="display:inline; margin:0; font-weight:normal; cursor:pointer;">
                        <input type="checkbox" id="transparentBg"> 透明
                    </label>
                </div>
            </div>
        </div>

        <div class="section">
            <label>選擇 Logo</label>
            <div class="logo-grid" id="logoGrid">
                <div class="logo-item active" data-logo="none">
                    <i class="fa-solid fa-ban"></i>
                    <span>無</span>
                </div>
                <div class="logo-item" data-logo="github">
                    <i class="fa-brands fa-github"></i>
                    <span>GitHub</span>
                </div>
                <div class="logo-item" data-logo="google">
                    <i class="fa-brands fa-google"></i>
                    <span>Google</span>
                </div>
                <div class="logo-item" data-logo="facebook">
                    <i class="fa-brands fa-facebook"></i>
                    <span>Facebook</span>
                </div>
                <div class="logo-item" data-logo="instagram">
                    <i class="fa-brands fa-instagram"></i>
                    <span>Instagram</span>
                </div>
                <div class="logo-item" data-logo="wifi">
                    <i class="fa-solid fa-wifi"></i>
                    <span>Wi-Fi</span>
                </div>
                <div class="logo-item" data-logo="custom">
                    <i class="fa-solid fa-upload"></i>
                    <span>自行上傳logo</span>
                </div>
            </div>
            <input type="file" id="customLogoInput" class="hidden" accept="image/*">
        </div>

        <div id="preview">
            <div id="qrcode"></div>
        </div>

        <button class="btn" id="downloadBtn">下載 QR Code</button>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const telInput = document.getElementById('telInput');
        const wifiSsid = document.getElementById('wifiSsid');
        const wifiPass = document.getElementById('wifiPass');
        const wifiEnc = document.getElementById('wifiEnc');
        const contentType = document.getElementById('contentType');
        const darkColor = document.getElementById('darkColor');
        const lightColor = document.getElementById('lightColor');
        const transparentBg = document.getElementById('transparentBg');
        const logoGrid = document.getElementById('logoGrid');
        const customLogoInput = document.getElementById('customLogoInput');
        const qrcodeContainer = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('downloadBtn');

        let qrcode = null;
        let selectedLogo = 'none';
        let customLogoData = null;

        const logoIcons = {
            github: 'https://cdn-icons-png.flaticon.com/512/25/25231.png',
            google: 'https://cdn-icons-png.flaticon.com/512/2991/2991148.png',
            facebook: 'https://cdn-icons-png.flaticon.com/512/124/124010.png',
            instagram: 'https://cdn-icons-png.flaticon.com/512/174/174855.png',
            wifi: 'https://cdn-icons-png.flaticon.com/512/748/748151.png'
        };

        function generateQR() {
            qrcodeContainer.innerHTML = '';
            let content = '';
            
            if (contentType.value === 'text') {
                content = textInput.value || ' ';
            } else if (contentType.value === 'tel') {
                content = 'tel:' + telInput.value;
            } else if (contentType.value === 'wifi') {
                content = `WIFI:S:${wifiSsid.value};T:${wifiEnc.value};P:${wifiPass.value};;`;
            }

            const bg = transparentBg.checked ? 'rgba(0,0,0,0)' : lightColor.value;
            
            qrcode = new QRCode(qrcodeContainer, {
                text: content,
                width: 256,
                height: 256,
                colorDark: darkColor.value,
                colorLight: bg,
                correctLevel: QRCode.CorrectLevel.H
            });

            setTimeout(() => {
                const img = qrcodeContainer.querySelector('img') || qrcodeContainer.querySelector('canvas');
                if (img && selectedLogo !== 'none') {
                    addLogoToQR();
                }
            }, 100);
        }

        function addLogoToQR() {
            const canvas = qrcodeContainer.querySelector('canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const logo = new Image();
            logo.crossOrigin = "Anonymous";
            
            logo.onload = () => {
                const size = canvas.width * 0.22;
                const x = (canvas.width - size) / 2;
                const y = (canvas.height - size) / 2;
                
                if (!transparentBg.checked) {
                    ctx.fillStyle = lightColor.value;
                    ctx.beginPath();
                    if (ctx.roundRect) ctx.roundRect(x - 4, y - 4, size + 8, size + 8, 8);
                    else ctx.rect(x - 4, y - 4, size + 8, size + 8);
                    ctx.fill();
                } else {
                    ctx.clearRect(x - 2, y - 2, size + 4, size + 4);
                }
                
                ctx.drawImage(logo, x, y, size, size);
                const img = qrcodeContainer.querySelector('img');
                if (img) img.src = canvas.toDataURL();
            };

            if (selectedLogo === 'custom' && customLogoData) {
                logo.src = customLogoData;
            } else if (logoIcons[selectedLogo]) {
                logo.src = logoIcons[selectedLogo];
            }
        }

        [textInput, telInput, wifiSsid, wifiPass, wifiEnc, contentType, darkColor, lightColor, transparentBg].forEach(el => {
            el.addEventListener('input', generateQR);
        });

        contentType.addEventListener('change', () => {
            document.getElementById('textInputGroup').classList.add('hidden');
            document.getElementById('telInputGroup').classList.add('hidden');
            document.getElementById('wifiInputGroup').classList.add('hidden');
            if (contentType.value === 'text') document.getElementById('textInputGroup').classList.remove('hidden');
            if (contentType.value === 'tel') document.getElementById('telInputGroup').classList.remove('hidden');
            if (contentType.value === 'wifi') document.getElementById('wifiInputGroup').classList.remove('hidden');
            generateQR();
        });

        logoGrid.addEventListener('click', (e) => {
            const item = e.target.closest('.logo-item');
            if (!item) return;
            
            document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            selectedLogo = item.dataset.logo;

            if (selectedLogo === 'custom') {
                customLogoInput.click();
            } else {
                generateQR();
            }
        });

        customLogoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    customLogoData = event.target.result;
                    generateQR();
                };
                reader.readAsDataURL(file);
            }
        });

        downloadBtn.addEventListener('click', () => {
            const canvas = qrcodeContainer.querySelector('canvas');
            if (!canvas) return;
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        generateQR();
    </script>
</body>
</html>
